name: AllergyLab CI

on: [push]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build images
        run: |
          cd Part7a

          APP_IMAGE=${{ secrets.DOCKER_USERNAME }}/al-app:${{ github.sha }}
          echo "APP_IMAGE=$APP_IMAGE" >> $GITHUB_ENV
          docker build -t $APP_IMAGE ./app

          DB_LOADER_IMAGE=${{ secrets.DOCKER_USERNAME }}/al-db-loader:${{ github.sha }}
          echo "DB_LOADER_IMAGE=$DB_LOADER_IMAGE" >> $GITHUB_ENV
          docker build -t $DB_LOADER_IMAGE ./db-loader

          EMAIL_IMAGE=${{ secrets.DOCKER_USERNAME }}/al-email:${{ github.sha }}
          echo "EMAIL_IMAGE=$EMAIL_IMAGE" >> $GITHUB_ENV
          docker build -t $EMAIL_IMAGE ./email

      - name: Push images to DockerHub
        run: |
          docker push $APP_IMAGE
          docker push $DB_LOADER_IMAGE
          docker push $EMAIL_IMAGE

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign images
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign $APP_IMAGE
          cosign sign $DB_LOADER_IMAGE
          cosign sign $EMAIL_IMAGE

  deploy:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Placeholder deploy to Kubernetes
        run: echo "Placeholder for deployment"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify images
        run: |
          APP_IMAGE=${{ secrets.DOCKER_USERNAME }}/al-app:${{ github.sha }}
          DB_LOADER_IMAGE=${{ secrets.DOCKER_USERNAME }}/al-db-loader:${{ github.sha }}
          EMAIL_IMAGE=${{ secrets.DOCKER_USERNAME }}/al-email:${{ github.sha }}

          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/docker.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            $APP_IMAGE

          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/docker.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            $DB_LOADER_IMAGE

          cosign verify \
            --certificate-identity "https://github.com/${{ github.repository }}/.github/workflows/docker.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            $EMAIL_IMAGE